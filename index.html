<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tic-Tac-Toe | Premium Edition</title>
    <meta name="description" content="A modern, high-fidelity Tic-Tac-Toe game with neon glassmorphism aesthetic. Play local multiplayer with smooth animations.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header>
            <h1>TIC TAC <span class="accent">TOE</span></h1>
            <p class="subtitle">Experience the classic in neon</p>
        </header>

        <section class="game-info">
            <div class="player-card active" id="player-x">
                <span class="symbol">X</span>
                <span class="name">Player 1</span>
                <span class="score" id="score-x">0</span>
            </div>
            <div class="player-card" id="player-o">
                <span class="symbol">O</span>
                <span class="name">Player 2</span>
                <span class="score" id="score-o">0</span>
            </div>
        </section>

        <section class="game-board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </section>

        <section class="controls">
            <button id="reset-btn" class="btn primary">Restart Game</button>
            <button id="clear-scores-btn" class="btn secondary">Clear Scores</button>
        </section>

        <div id="status-message" class="status-message">Your turn, Player X</div>
    </main>

    <div id="win-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h2 id="winner-text">Player X Wins!</h2>
            <button id="play-again-btn" class="btn large">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
